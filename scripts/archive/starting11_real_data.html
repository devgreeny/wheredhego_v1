<!DOCTYPE html>
<html>
<head>
    <title>Starting11 - 2022 World Cup Final</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: white; }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; }
        h1 { text-align: center; margin-bottom: 10px; }
        .subtitle { text-align: center; color: #888; margin-bottom: 30px; }
        
        .pitch {
            position: relative;
            width: 100%;
            aspect-ratio: 1.5;
            background: linear-gradient(to bottom, #2d5a27, #3d7a37);
            border-radius: 8px;
            border: 3px solid white;
            overflow: hidden;
        }
        
        .pitch::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 2px;
            background: rgba(255,255,255,0.5);
        }
        
        .pitch::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120px;
            height: 120px;
            border: 2px solid rgba(255,255,255,0.5);
            border-radius: 50%;
        }
        
        .player {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            transform: translate(-50%, -50%);
        }
        
        .badge {
            width: 50px;
            height: 50px;
            background: white;
            border-radius: 8px;
            padding: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        
        .badge img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        .jersey {
            margin-top: 4px;
            background: rgba(0,0,0,0.7);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: bold;
        }
        
        .answer-box {
            margin-top: 30px;
            text-align: center;
        }
        
        .answer-box input {
            padding: 12px 20px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            width: 300px;
        }
        
        .answer-box button {
            padding: 12px 30px;
            font-size: 18px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏆 Starting 11</h1>
        <p class="subtitle">World Cup 2022 Final • Guess the National Team</p>
        
        <div class="pitch">

            <div class="player" style="left: 50%; top: 90%;">
                <div class="badge"><img src="https://tmssl.akamaized.net/images/wappen/head/405.png" alt="Aston Villa"></div>
                <span class="jersey">#23</span>
            </div>

            <div class="player" style="left: 20%; top: 70%;">
                <div class="badge"><img src="https://tmssl.akamaized.net/images/wappen/head/148.png" alt="Tottenham Hotspur"></div>
                <span class="jersey">#13</span>
            </div>

            <div class="player" style="left: 40%; top: 72%;">
                <div class="badge"><img src="https://tmssl.akamaized.net/images/wappen/head/294.png" alt="SL Benfica"></div>
                <span class="jersey">#19</span>
            </div>

            <div class="player" style="left: 60%; top: 72%;">
                <div class="badge"><img src="https://tmssl.akamaized.net/images/wappen/head/1041.png" alt="Olympique Lyon"></div>
                <span class="jersey">#3</span>
            </div>

            <div class="player" style="left: 80%; top: 70%;">
                <div class="badge"><img src="https://tmssl.akamaized.net/images/wappen/head/13.png" alt="Atlético de Madrid"></div>
                <span class="jersey">#26</span>
            </div>

            <div class="player" style="left: 25%; top: 50%;">
                <div class="badge"><img src="https://tmssl.akamaized.net/images/wappen/head/294.png" alt="SL Benfica"></div>
                <span class="jersey">#24</span>
            </div>

            <div class="player" style="left: 50%; top: 45%;">
                <div class="badge"><img src="https://tmssl.akamaized.net/images/wappen/head/13.png" alt="Atlético de Madrid"></div>
                <span class="jersey">#7</span>
            </div>

            <div class="player" style="left: 75%; top: 50%;">
                <div class="badge"><img src="https://tmssl.akamaized.net/images/wappen/head/1237.png" alt="Brighton & Hove Albion"></div>
                <span class="jersey">#20</span>
            </div>

            <div class="player" style="left: 20%; top: 25%;">
                <div class="badge"><img src="https://tmssl.akamaized.net/images/wappen/head/506.png" alt="Juventus FC"></div>
                <span class="jersey">#11</span>
            </div>

            <div class="player" style="left: 50%; top: 20%;">
                <div class="badge"><img src="https://tmssl.akamaized.net/images/wappen/head/583.png" alt="Paris Saint-Germain"></div>
                <span class="jersey">#10</span>
            </div>

            <div class="player" style="left: 80%; top: 25%;">
                <div class="badge"><img src="https://tmssl.akamaized.net/images/wappen/head/281.png" alt="Manchester City"></div>
                <span class="jersey">#9</span>
            </div>

        </div>
        
        <div class="answer-box">
            <input type="text" placeholder="Which national team is this?" id="guess">
            <button onclick="checkAnswer()">Submit</button>
        </div>
    </div>
    
    <script>
        function checkAnswer() {
            const guess = document.getElementById('guess').value.toLowerCase();
            if (guess.includes('argentin')) {
                alert('🎉 Correct! This is Argentina\'s starting 11 from the 2022 World Cup Final!');
            } else {
                alert('❌ Try again!');
            }
        }
    </script>
</body>
</html>
